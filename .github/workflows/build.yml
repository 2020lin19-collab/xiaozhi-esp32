name: Build Suyula Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 关键：把版本从 v5.4 改成 latest (这会使用最先进的 5.5+ 版本)
    container: espressif/idf:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          git config --global --add safe.directory /__w/xiaozhi-esp32/xiaozhi-esp32
          python3 scripts/release.py xingzhi-cube-1.54tft-wifi -c config.json

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: suyula-firmware
          path: build/merged-binary.bin
