name: Build Suyula Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          git config --global --add safe.directory /__w/xiaozhi-esp32/xiaozhi-esp32
          
          # 修正这里的符号错误，直接用 "*"
          idf.py add-dependency "espressif/mqtt*"
          
          python3 scripts/release.py xingzhi-cube-1.54tft-wifi -c config.json

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: suyula-firmware
          path: build/merged-binary.bin
