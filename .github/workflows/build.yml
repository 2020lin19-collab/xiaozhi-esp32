name: Build Suyula Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.4
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        shell: bash
        run: |
          # 这一行是关键：手动激活编译工具
          . $IDF_PATH/export.sh
          
          # 解决 GitHub 目录安全权限问题
          git config --global --add safe.directory /__w/xiaozhi-esp32/xiaozhi-esp32
          
          # 执行编译
          python3 scripts/release.py xingzhi-cube-1.54tft-wifi -c config.json

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: suyula-firmware
          path: build/merged-binary.bin
