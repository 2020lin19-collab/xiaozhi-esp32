name: Build xingzhi-cube-1.54tft-wifi

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - ci/*
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build merged-binary.bin
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware (esp32s3 / xingzhi-cube-1.54tft-wifi)
        shell: bash
        run: |
          set -euo pipefail
          source "$IDF_PATH/export.sh"

          # Force install mqtt component to avoid esp-ml307 dependency resolution failure
          idf.py add-dependency "espressif/mqtt^*"

          # Ensure target is esp32s3 and build selected board
          idf.py set-target esp32s3
          python3 scripts/release.py xingzhi-cube-1.54tft-wifi

          # Ensure merged binary exists
          test -f build/merged-binary.bin

      - name: Upload merged binary
        uses: actions/upload-artifact@v4
        with:
          name: merged-binary_xingzhi-cube-1.54tft-wifi_${{ github.sha }}
          path: build/merged-binary.bin
          if-no-files-found: error
