name: Build xingzhi-cube-1.54tft-wifi

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - ci/*
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build merged-binary.bin
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        shell: bash
        run: |
          set -euo pipefail
          source "$IDF_PATH/export.sh"

          # 强制补齐 MQTT 依赖（用于你之前的 mqtt 解析报错）
          idf.py add-dependency "espressif/mqtt^*"

          # 确保目标为 esp32s3
          idf.py set-target esp32s3

          # 构建指定目标板子：xingzhi-cube-1.54tft-wifi
          python3 scripts/release.py xingzhi-cube-1.54tft-wifi --name xingzhi-cube-1.54tft-wifi

          # 确保输出存在
          test -f build/merged-binary.bin

      - name: Upload merged binary
        uses: actions/upload-artifact@v4
        with:
          name: merged-binary_xingzhi-cube-1.54tft-wifi_${{ github.sha }}
          path: build/merged-binary.bin
          if-no-files-found: error
